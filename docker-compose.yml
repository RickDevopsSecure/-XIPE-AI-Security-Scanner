version: '3.8'

services:
  # XIPE Scanner
  xipe:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TARGET_URL=${TARGET_URL:-http://mock-target:8080}
      - CLIENT_NAME=${CLIENT_NAME:-Local Test}
      - ENGAGEMENT_ID=${ENGAGEMENT_ID:-ENG-LOCAL-001}
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL:-}
    volumes:
      - ./output:/app/output
      - ./config.yaml:/app/config.yaml
    depends_on:
      - mock-target
    networks:
      - xipe-net

  # Mock AI Platform (for testing without a real target)
  mock-target:
    build:
      context: .
      dockerfile: Dockerfile.mock
    ports:
      - "8080:8080"
    networks:
      - xipe-net

networks:
  xipe-net:
    driver: bridge
